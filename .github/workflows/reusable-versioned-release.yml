name: Reusable Versioned Release

on:
  workflow_call:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: string
    outputs:
      new_version:
        description: "Bare package version"
        value: ${{ jobs.prepare.outputs.new_version }}
      new_tag:
        description: "Release tag"
        value: ${{ jobs.prepare.outputs.new_tag }}
      revision_sha:
        description: "Release commit revision"
        value: ${{ jobs.prepare.outputs.revision_sha }}

permissions:
  contents: write

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.10.0"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.next_version.outputs.new_version }}
      new_tag: ${{ steps.next_version.outputs.new_tag }}
      revision_sha: ${{ steps.revision.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get current version
        id: get_version
        run: |
          set -euo pipefail
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")"
          TAG_VERSION="${LATEST_TAG#v}"
          FILE_VERSION="$(node -p "require('./package.json').version")"

          function version_gt() { test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"; }

          if version_gt "${FILE_VERSION}" "${TAG_VERSION}"; then
            VERSION="${FILE_VERSION}"
          else
            VERSION="${TAG_VERSION}"
          fi

          echo "Current version: ${VERSION}"
          echo "current_version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Calculate next version
        id: next_version
        env:
          VERSION_TYPE: ${{ inputs.version_type }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.current_version }}"
          BASE_VERSION="$(echo "${VERSION}" | sed 's/-.*$//')"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          case "${VERSION_TYPE}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            *)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "New version: ${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "new_tag=v${NEW_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag is available
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "Tag ${NEW_TAG} already exists." >&2
            exit 1
          fi

      - name: Update package version
        run: pnpm version ${{ steps.next_version.outputs.new_version }} --no-git-tag-version

      - name: Release Blocking Gates
        run: |
          pnpm typecheck
          pnpm check:arch
          pnpm coverage:ci
          pnpm smoke
          pnpm docker:smoke

      - name: Commit package version and create tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ steps.next_version.outputs.new_tag }} [skip ci]"
          fi

          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin HEAD:main "${NEW_TAG}"

      - name: Capture release revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
