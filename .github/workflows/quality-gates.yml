name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.10.0"

jobs:
  ubuntu-quality:
    name: Required Gates - Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Required - Static Analysis
        run: pnpm check:static

      - name: Required - TypeScript
        run: pnpm typecheck

      - name: Required - Architecture
        run: pnpm check:arch

      - name: Required - Coverage
        run: pnpm coverage:ci

      - name: Required - Smoke
        run: pnpm smoke

      - name: Required - Performance Regression
        run: pnpm check:bench

      - name: Observation - Tool Sieve Benchmark Snapshot
        continue-on-error: true
        env:
          BENCH_CASES: stream_sieve_held_tool
          BENCH_ITERS: "20"
          BENCH_WARMUP: "5"
        run: node scripts/bench.mjs

      - name: Required - Bundle Size
        run: pnpm check:size

  node-unit:
    name: Required Gates - Node Unit (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: "22"
          - os: ubuntu-latest
            node-version: "24"
          - os: macos-latest
            node-version: "26"
          - os: windows-latest
            node-version: "26"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Required - Node Unit
        run: pnpm unit:quick

  docker-smoke:
    name: Release Required Gate - Docker Smoke
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Required - Docker Smoke
        run: node scripts/docker-smoke.mjs
