name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build/publish (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name || github.event.inputs.release_tag }}
  cancel-in-progress: false

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.10.0"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release Blocking Gates
        run: |
          pnpm typecheck
          pnpm check:arch
          pnpm coverage:ci
          pnpm smoke
          pnpm docker:smoke

      - name: Build Worker Artifact
        run: pnpm build

      - name: Prepare Release Assets
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          if [ -z "${TAG}" ]; then
            echo "release tag is empty; set release_tag when using workflow_dispatch." >&2
            exit 1
          fi

          mkdir -p release-assets
          cp dist/worker.js "release-assets/worker.js"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for GHCR endpoint
        run: |
          set -euo pipefail
          for i in {1..6}; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://ghcr.io/v2/ || true)"
            if [ "${code}" = "200" ] || [ "${code}" = "401" ] || [ "${code}" = "405" ]; then
              exit 0
            fi
            sleep "$((i * 10))"
          done
          echo "GHCR endpoint is unreachable after multiple retries (last status: ${code:-unknown})." >&2
          exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta_release
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_release.outputs.tags }}
          labels: ${{ steps.meta_release.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image archives for release assets
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"

          docker buildx build \
            --platform linux/amd64 \
            --tag "web2gem:${TAG}" \
            --tag "web2gem:latest" \
            --cache-from type=gha \
            --output type=docker,dest="release-assets/web2gem_${TAG}_docker_linux_amd64.tar" \
            .

          docker buildx build \
            --platform linux/arm64 \
            --tag "web2gem:${TAG}" \
            --tag "web2gem:latest" \
            --cache-from type=gha \
            --output type=docker,dest="release-assets/web2gem_${TAG}_docker_linux_arm64.tar" \
            .

          gzip -f "release-assets/web2gem_${TAG}_docker_linux_amd64.tar"
          gzip -f "release-assets/web2gem_${TAG}_docker_linux_arm64.tar"

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd release-assets && sha256sum worker.js *.tar.gz > sha256sums.txt)

      - name: Validate release assets
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          test -s release-assets/worker.js
          test -s "release-assets/web2gem_${TAG}_docker_linux_amd64.tar.gz"
          test -s "release-assets/web2gem_${TAG}_docker_linux_arm64.tar.gz"
          test -s release-assets/sha256sums.txt

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          FILES=(
            release-assets/worker.js
            "release-assets/web2gem_${TAG}_docker_linux_amd64.tar.gz"
            "release-assets/web2gem_${TAG}_docker_linux_arm64.tar.gz"
            release-assets/sha256sums.txt
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILES[@]}" --clobber
          else
            gh release create "${TAG}" "${FILES[@]}" --title "${TAG}" --notes ""
          fi
